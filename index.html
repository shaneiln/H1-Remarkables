<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H1 Remarkables — Energy Efficiency Specialists</title>
  <meta name="description" content="H1 Compliance Reports, Building Consent ready. Accurate, efficient and designed for the region." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100vh;
    }

    .logo-wrap img {
      height: 360px;
      width: auto;
      display: block;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 0;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #2E6417;
      margin-bottom: 2rem;
    }

    .tagline {
      font-size: 18px;
      color: #333;
      line-height: 1.75;
      max-width: 480px;
      margin-bottom: 2rem;
    }

    .contact-block {
      font-size: 14px;
      color: #666;
    }

    .contact-link {
      color: #2E6417;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid #a0c88a;
      padding-bottom: 1px;
    }

    .contact-link:hover {
      color: #1e4310;
      border-bottom-color: #2E6417;
    }

    .footer {
      font-size: 12px;
      color: #aaa;
      padding-top: 2rem;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (max-width: 480px) {
      .page { padding: 2rem 1.25rem; }
      .logo-wrap img { height: 220px; }
      .footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="page">

    <header>
      <div class="logo-wrap">
        <img src="H1.png" alt="H1 Remarkables — Energy Efficiency Specialists" />
      </div>
    </header>

    <main class="main">
      <div class="divider"></div>
      <p class="tagline">
        H1 Compliance Reports, Building Consent ready.
        Accurate, efficient and designed for the region.
      </p>
      <div class="contact-block">
        Get in touch &mdash;
        <!-- TO UPDATE: replace with your real email address -->
        <a class="contact-link" href="mailto:hello@h1remarkables.co.nz">hello@h1remarkables.co.nz</a>
      </div>
    </main>

    <footer class="footer">
      <span>Central Otago &amp; Queenstown Lakes</span>
      <span>&copy; 2026 H1 Remarkables</span>
    </footer>

  </div>
</body>
</html>
